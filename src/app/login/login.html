<main class="main"  [class.light-mode]="!darkMode">

  <nav class="navbar fixed-top bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand">Nombre de la pagina</a>
      <button id="boton-cambio"
        type="button"
        class="btn btn-outline-light"
        (click)="toggleTheme()">
        <i class="fa-solid fa-moon"></i>

      </button>
      <div class="boton-login">
        <button type="button" routerLink="/admin-login" class="btn btn-outline-success">Admin</button>
      </div>
    </div>

  </nav>

  <div class="recuadro">
    <h1> Inicio De Sesión</h1>
    <form class="datos">
      <div class="input-group mb-3">
        <span class="input-group-text" id="usuario"><i class="fa-solid fa-circle-user"></i></span>
        <input name="usuario" type="text" class="form-control" placeholder="Usuario" aria-label="usuario" aria-describedby="usuario">
      </div>
      <div class="input-group mb-3">
        <span class="input-group-text" id="contrasena"><i class="fa-solid fa-lock"></i></span>
        <input  name="contrasena" type="password" class="form-control" placeholder="Contraseña" aria-label="contrasena" aria-describedby="contrasena">
      </div>
    </form>
    <div class="boton-login">
      <button type="button" routerLink="/carga-archivo" class="btn btn-outline-success">Iniciar Sesion</button>
    </div>
    <p>¿No tiene una cuenta? <a routerLink="/register" class="mi-enlace"> Registrarse</a></p>
  </div>


</main>
