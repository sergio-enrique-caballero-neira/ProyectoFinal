<main class="main" [class.light-mode]="!darkMode">

  <nav class="navbar fixed-top bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand">Nombre de la pagina {{ usuario }}</a>
      <div>
        <button type="button" class="btn btn-outline-light boton-salir" (click)="logout()">
          <i class="fa-regular fa-circle-xmark"></i>
        </button>
        <button type="button" class="btn btn-outline-light boton-color" (click)="toggleTheme()">
          <i [class]="darkMode ? 'fa-solid fa-moon' : 'fa-solid fa-sun'"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="upload-section" id="zonaarchivo">
    <div
      class="drop-zone"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
      [class.dragging]="isDragging">
      <div *ngIf="!selectedFile">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <h2>Arrastra tu archivo aquí</h2>
        <p>o</p>
        <label class="upload-btn">
          Seleccionar archivo </label>
        <input
          type="file"
          hidden
          (change)="onFileSelected($event)">

      </div>

      <div class="botones-acciones">
        <button class="led-btn">Subir</button>
        <button class="led-btn">Analizar</button>
      </div>

    </div>

    <div class="botones-acciones">
      <button class="led-btn">Subir</button>
      <button class="led-btn">Analizar</button>
    </div>

  </div>
  <div>
    <div class="recuadro">
      <h1>Historial</h1>
    </div>
    <div class="recuadroHistorial">

    </div>
  </div>


</main>
